# Batch 2 — ERROR-METRIC task (Task B): error-metric surrogate.
#
# Predict the scalar voltage/temperature RMSE of a simulated sequence from its
# parameter vector + operating condition. Implemented from the Data_Batch_2
# README spec (no Batch 1 precedent existed). Fully isolated from Task A.
#
# Pipeline:  src/error_metric_data.py  +  src/error_metric_train.py
# Entrypoint: scripts/train_error_metric.py
# Audit:      scripts/audit_error_metric.py

status: runnable
dataset_name: Data_Batch_2
task: error_metric

# Raw Batch 2 dir holding the three source CSVs (immutable; read-only).
data_dir: data/Data_Batch_2

# Isolated Task-B namespaces (run_id appended by the launch scripts).
output_root: outputs/Data_Batch_2/error_metric
log_root: logs/Data_Batch_2/error_metric
smoke_output_root: outputs_smoke/Data_Batch_2/error_metric
audit_path: outputs/Data_Batch_2/data_audit/error_metric/data_quality_summary.json

# Inputs: 12 physical parameters + operating-condition features.
# operation_code is one-hot encoded explicitly; c_rate / ambient_temp_C /
# initial_temp_C are continuous. Only continuous features are standardised.
features:
  parameters: 12                       # from parameter_sets.csv (joined on sample_id)
  condition_numeric: [c_rate, ambient_temp_C, initial_temp_C]
  condition_categorical_onehot: [operation_code]

targets:
  - rmse_voltage_mv
  - rmse_temperature_c
target_scaling: standard_per_target    # each target standardised separately

# Split over UNIQUE sample_id so a parameter set never crosses splits.
train_ratio: 0.7
val_ratio: 0.15
test_ratio: 0.15
seed: 42
split_by: sample_id

models:
  - extratrees        # baseline (sklearn ExtraTreesRegressor, multi-output)
  - mlp               # main model (torch multi-output MLP)

# MLP hyperparameters.
epochs: 200
batch_size: 256
lr: 0.001
weight_decay: 0.0001
hidden_dim: 128
num_layers: 3
dropout: 0.1
patience: 20
device: auto

# ExtraTrees hyperparameters.
n_estimators: 300

metrics: [RMSE, MAE, R2]   # reported per target and overall, on physical units
